function copyCode(btn) {
  const pre = btn.closest('.code-wrap').querySelector('pre');
  navigator.clipboard.writeText(pre.innerText).then(() => {
    const originalText = btn.textContent;
    btn.textContent = 'Copied!';
    btn.style.background = 'var(--gold)';
    btn.style.color = '#000';
    btn.style.borderColor = 'var(--gold)';
    
    setTimeout(() => {
      btn.textContent = originalText;
      btn.style.background = '';
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 2000);
  }).catch(err => {
    console.error('Failed to copy text: ', err);
  });
}

// ─── 2: IMPUTATION ───
{html: `
<div class="slide-body">
  <h3>Data Engineering</h3>
  <h2>KNN Imputation Strategy</h2>
  <p>Because the AcousticBrainz service officially shut down in late 2022, entries for 2025 required full mood inference. We utilized K-Nearest Neighbors (KNN) to extrapolate features.</p>
  
  <div class="two-col">
    <div>
      <div class="highlight-box">
        <p><strong>The Distance Metric:</strong> We computed the distance between 2025 songs and our 700-song fully-labeled donor pool (2018-2024) utilizing the 5 core Spotify features, standardized by their deviation.</p>
        <p style="text-align:center;color:var(--teal);margin-top:20px;font-size:28px;">$$ d(x,y) = \\sqrt{\\sum_{i=1}^{n}\\left(\\frac{x_i - y_i}{\\sigma_i}\\right)^2} $$</p>
      </div>
      <p style="margin-top: 20px;">A strict post-generation validation check ensured no partially-labeled records entered the R analysis pipeline.</p>
    </div>
    <div>
      <div class="code-wrap">
        <div class="code-header">
          <span class="code-lang">Python · Euclidean Distance Inference</span>
          <button class="copy-btn" onclick="copyCode(this)">Copy</button>
        </div>
        <pre><span class="cm"># Normalize donor space by standard deviation</span>
scales <span class="op">=</span> donors[PUBLIC_COLS].<span class="fn">std</span>().<span class="fn">replace</span>(<span class="num">0</span>, <span class="num">1</span>)

<span class="kw">for</span> idx, row <span class="kw">in</span> result.<span class="fn">iterrows</span>():
    <span class="cm"># Compute normalized Euclidean distance array</span>
    distances <span class="op">=</span> (
        ((donors[PUBLIC_COLS] <span class="op">-</span> row[PUBLIC_COLS]) 
        <span class="op">/</span> scales) <span class="op">**</span> <span class="num">2</span>
    ).<span class="fn">sum</span>(axis<span class="op">=</span><span class="num">1</span>) <span class="op">**</span> <span class="num">0.5</span>
    
    <span class="cm"># Extract exact match and impute target features</span>
    nearest <span class="op">=</span> donors.<span class="fn">loc</span>[distances.<span class="fn">idxmin</span>()]</pre>
      </div>
    </div>
  </div>
</div>
`, badge:'badge-intro', section:'Methodology', title:'Imputation Math'},

<div class="slide-body">
  <h3>RQ1 · Methodology</h3>
  <h2>OLS Regression Engine</h2>
  <p>For each candidate predictor $x_{i}$, we fit a simple ordinary-least-squares (OLS) regression over the pooled 800-song dataset to compute the Pearson correlation coefficient.</p>
  
  <p style="text-align:center; padding: 20px; font-size:32px; color:var(--gold);">$$ \\hat{happy}_{j}=\\hat{\\beta}_{0}+\\hat{\\beta}_{1}x_{ij} $$</p>

  <div class="code-wrap">
    <div class="code-header">
      <span class="code-lang">R · Correlation Pipeline</span>
      <button class="copy-btn" onclick="copyCode(this)">Copy</button>
    </div>
    <pre><span class="cm"># Loop linear model across all predictors</span>
lm_results <span class="op">&lt;-</span> <span class="fn">lapply</span>(predictors, <span class="kw">function</span>(p) {
  
  formula <span class="op">&lt;-</span> <span class="fn">as.formula</span>(<span class="fn">paste</span>(<span class="str">"happy_prob ~"</span>, p))
  model <span class="op">&lt;-</span> <span class="fn">lm</span>(formula, data <span class="op">=</span> combined.data)

// ─── 11: RQ3 METHODOLOGY ───
{html: `
<div class="slide-body">
  <h3>RQ3 · Methodology</h3>
  <h2>Independent Two-Sample T-Test</h2>
  <p>We created a binary <code>top20</code> indicator and computed the mean duration for Top 20 vs. remaining charting songs, testing the difference with a two-sample t-test.</p>

  <div class="code-wrap" style="margin-top: 10px;">
    <div class="code-header">
      <span class="code-lang">R · T-Test Execution</span>
      <button class="copy-btn" onclick="copyCode(this)">Copy</button>
    </div>
    <pre><span class="cm"># Partition into Top 20 vs Rest</span>
combined.data<span class="op">$</span>top20 <span class="op">&lt;-</span> <span class="fn">ifelse</span>(combined.data<span class="op">$</span>billboard_rank <span class="op">&lt;=</span> <span class="num">20</span>, <span class="num">1</span>, <span class="num">0</span>)

<span class="cm"># Group summarization</span>
duration_summary <span class="op">&lt;-</span> combined.data <span class="op">%&gt;%</span>
  <span class="fn">group_by</span>(top20) <span class="op">%&gt;%</span>
  <span class="fn">summarise</span>(avg_duration <span class="op">=</span> <span class="fn">mean</span>(duration_minutes), n_songs <span class="op">=</span> <span class="fn">n</span>())

<span class="cm"># Perform two-sample t-test</span>
<span class="fn">t.test</span>(duration_minutes <span class="op">~</span> top20, data <span class="op">=</span> combined.data)</pre>
  </div>
</div>
`, badge:'badge-q3', section:'RQ3 (2/4)', title:'Methodology'},

// ─── ENGINE LOGIC ───
let current = 0;
const total = slides.length;
const deck = document.getElementById('deck');
const curEl = document.getElementById('cur');
const totEl = document.getElementById('tot');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progress = document.getElementById('progress-bar');

totEl.textContent = total;

slides.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'slide' + (i === 0 ? ' active' : '');
  el.id = `slide-${i}`;
  el.innerHTML = `
    <div class="slide-header">
      <div class="section-badge ${s.badge}">${s.section}</div>
      <div class="slide-header-title">${s.title}</div>
    </div>
    ${s.html}
  `;
  deck.appendChild(el);
});

function updateNav() {
  curEl.textContent = current + 1;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === total - 1;
  progress.style.width = ((current + 1) / total * 100) + '%';
}

function goTo(idx) {
  if (idx < 0 || idx >= total || idx === current) return;
  document.getElementById(`slide-${current}`).className = 'slide out';
  document.getElementById(`slide-${idx}`).className = 'slide active';
  current = idx;
  updateNav();
  if (slides[current].onRender) {
    // Timeout ensures DOM transitions before Plotly computes container width
    setTimeout(() => slides[current].onRender(), 50);
  }
}

function nextSlide() { goTo(current + 1); }
function prevSlide() { goTo(current - 1); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextSlide();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevSlide();
});

updateNav();
if (slides[0].onRender) slides[0].onRender();
</script>
</body>
